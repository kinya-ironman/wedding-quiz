<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚙️ 問題編集 管理画面</title>
<style>
  :root{ --crimson:#6B0010; --crimson2:#8B0020; --gold:#C9A84C; --gold-l:#E8D08A; --off-white:#F5EED8; --dark:#1a0005; }
  *{ box-sizing:border-box; margin:0; padding:0; }
  body{ font-family:'Georgia',serif; background:var(--dark); color:var(--off-white); min-height:100vh; }
  .topbar{ background:var(--gold); color:var(--crimson); display:flex; align-items:center; justify-content:space-between; padding:10px 20px; font-weight:bold; font-size:16px; letter-spacing:2px; }
  .topbar a{ color:var(--crimson); text-decoration:none; font-size:13px; }
  .container{ max-width:860px; margin:0 auto; padding:20px 16px; }

  .card{ background:var(--crimson); border:1.5px solid var(--gold); border-radius:8px; padding:18px; margin-bottom:16px; }
  .card h2{ color:var(--gold); font-size:15px; letter-spacing:2px; margin-bottom:14px; border-bottom:1px solid var(--gold); padding-bottom:7px; }

  .q-block{ background:var(--dark); border:1px solid rgba(201,168,76,.4); border-radius:8px; padding:16px; margin-bottom:12px; position:relative; }
  .q-block .q-num{ color:var(--gold); font-size:13px; font-weight:bold; margin-bottom:10px; letter-spacing:1px; }
  .q-block .del-btn{ position:absolute; top:12px; right:12px; background:#a71d2a; color:white; border:none; border-radius:4px; padding:4px 10px; cursor:pointer; font-size:12px; }

  label{ display:block; font-size:13px; color:var(--gold-l); margin-bottom:4px; margin-top:10px; }
  input[type="text"], textarea, select{
    width:100%; padding:10px 12px; font-size:14px; font-family:'Georgia',serif;
    background:var(--crimson2); border:1.5px solid var(--gold); border-radius:6px;
    color:var(--off-white); outline:none;
  }
  input[type="text"]:focus, textarea:focus{ border-color:var(--gold-l); }
  textarea{ resize:vertical; min-height:60px; }

  .choices-row{ display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .choice-item{ position:relative; }
  .correct-indicator{
    position:absolute; right:8px; top:50%; transform:translateY(-50%);
    background:var(--gold); color:var(--crimson); font-size:11px; font-weight:bold;
    padding:2px 6px; border-radius:4px; pointer-events:none; display:none;
  }

  .correct-select{ display:flex; gap:8px; flex-wrap:wrap; margin-top:6px; }
  .correct-btn{
    padding:7px 14px; border:2px solid var(--gold); border-radius:6px;
    background:var(--dark); color:var(--gold); font-family:'Georgia',serif;
    font-size:14px; font-weight:bold; cursor:pointer; transition:all .15s;
  }
  .correct-btn.active{ background:var(--gold); color:var(--crimson); }

  .btn{ padding:11px 24px; border:none; border-radius:6px; font-size:15px; font-family:'Georgia',serif; font-weight:bold; cursor:pointer; transition:opacity .15s; letter-spacing:1px; }
  .btn-gold{ background:var(--gold); color:var(--crimson); }
  .btn-dark{ background:var(--dark); color:var(--gold); border:1.5px solid var(--gold); }
  .btn-green{ background:#1a7a34; color:white; }
  .btn-row{ display:flex; gap:10px; flex-wrap:wrap; margin-top:14px; }

  .toast{
    position:fixed; bottom:24px; left:50%; transform:translateX(-50%);
    background:var(--gold); color:var(--crimson); font-weight:bold;
    padding:12px 28px; border-radius:8px; font-size:15px;
    opacity:0; transition:opacity .3s; pointer-events:none;
    z-index:100;
  }
  .toast.show{ opacity:1; }
</style>
</head>
<body>

<div class="topbar">
  <span>⚙️ 問題編集 管理画面</span>
  <a href="/host">← 幹事画面に戻る</a>
</div>

<div class="container">
  <div class="card">
    <h2>📝 クイズ問題の編集</h2>
    <p style="font-size:13px;color:var(--gold-l);margin-bottom:14px;">問題を編集して「サーバーに反映」ボタンを押すと即座に反映されます。※サーバー再起動するとquestions.jsの内容に戻ります。</p>
    <div id="questions-list"></div>
    <div class="btn-row">
      <button class="btn btn-dark" onclick="addQuestion()">＋ 問題を追加</button>
      <button class="btn btn-green" onclick="applyToServer()">✅ サーバーに反映</button>
      <button class="btn btn-gold" onclick="copyJson()">📋 JSONをコピー</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const WS_URL=(location.protocol==='https:'?'wss://':'ws://')+location.host;
const LABELS=['A','B','C','D'];
let ws, questions=[];

// WebSocket
function connect(){
  ws=new WebSocket(WS_URL);
  ws.onopen=()=>{ ws.send(JSON.stringify({type:'host_join'})); };
  ws.onclose=()=>setTimeout(connect,2000);
  ws.onmessage=(e)=>{
    const msg=JSON.parse(e.data);
    if(msg.type==='questions_updated') showToast(`✅ ${msg.count}問をサーバーに反映しました！`);
  };
}

// 問題読み込み
async function loadQuestions(){
  const res=await fetch('/api/questions');
  questions=await res.json();
  renderAll();
}

function renderAll(){
  const container=document.getElementById('questions-list');
  container.innerHTML='';
  questions.forEach((q,i)=>container.appendChild(makeQBlock(q,i)));
}

function makeQBlock(q,i){
  const div=document.createElement('div');
  div.className='q-block';
  div.id='qblock-'+i;
  div.innerHTML=`
    <div class="q-num">第${i+1}問</div>
    <button class="del-btn" onclick="deleteQ(${i})">✕ 削除</button>
    <label>問題文</label>
    <textarea id="q-text-${i}" rows="2">${esc(q.question)}</textarea>
    <label>選択肢</label>
    <div class="choices-row">
      ${q.choices.map((c,ci)=>`
        <div class="choice-item">
          <input type="text" id="choice-${i}-${ci}" value="${esc(c)}" placeholder="${LABELS[ci]}の選択肢">
        </div>
      `).join('')}
    </div>
    <label>正解</label>
    <div class="correct-select" id="correct-${i}">
      ${LABELS.map((l,ci)=>`
        <button class="correct-btn${q.correct===ci?' active':''}" onclick="setCorrect(${i},${ci})">${l}</button>
      `).join('')}
    </div>
    <label>ヒント（幹事画面に表示）</label>
    <input type="text" id="hint-${i}" value="${esc(q.hint||'')}">
  `;
  return div;
}

function setCorrect(qi,ci){
  document.querySelectorAll(`#correct-${qi} .correct-btn`).forEach((b,i)=>{
    b.className='correct-btn'+(i===ci?' active':'');
  });
}

function getCorrect(qi){
  const btns=document.querySelectorAll(`#correct-${qi} .correct-btn`);
  for(let i=0;i<btns.length;i++) if(btns[i].classList.contains('active')) return i;
  return 0;
}

function collectQuestions(){
  return questions.map((_,i)=>({
    question: document.getElementById(`q-text-${i}`).value.trim(),
    choices: [0,1,2,3].map(ci=>document.getElementById(`choice-${i}-${ci}`).value.trim()),
    correct: getCorrect(i),
    hint: document.getElementById(`hint-${i}`).value.trim(),
  }));
}

function addQuestion(){
  questions.push({ question:'新しい問題', choices:['選択肢A','選択肢B','選択肢C','選択肢D'], correct:0, hint:'' });
  renderAll();
  // 新しい問題までスクロール
  document.getElementById('qblock-'+(questions.length-1)).scrollIntoView({behavior:'smooth'});
}

function deleteQ(i){
  if(!confirm(`第${i+1}問を削除しますか？`)) return;
  questions.splice(i,1);
  renderAll();
}

function applyToServer(){
  const updated=collectQuestions();
  if(!updated.length){ showToast('⚠️ 問題が0件です'); return; }
  questions=updated;
  ws.send(JSON.stringify({type:'update_questions', questions}));
}

function copyJson(){
  const updated=collectQuestions();
  const json='module.exports = '+JSON.stringify(updated,null,2)+';';
  navigator.clipboard.writeText(json).then(()=>showToast('📋 JSONをコピーしました！questions.jsに貼り付けてください'));
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.className='toast show';
  setTimeout(()=>t.className='toast',2500);
}

function esc(str){ return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

connect();
loadQuestions();
</script>
</body>
</html>
