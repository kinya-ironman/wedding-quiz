<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🎉 クイズ大会</title>
<style>
  :root {
    --crimson: #6B0010;
    --crimson2: #8B0020;
    --gold: #C9A84C;
    --gold-l: #E8D08A;
    --off-white: #F5EED8;
    --dark: #1a0005;
    --green: #1e7e34;
    --red: #a71d2a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body {
    height: 100%;
    font-family: 'Georgia', serif;
    background: var(--dark);
    color: var(--off-white);
    overflow: hidden;
  }

  /* ── TOP BAR ── */
  .topbar {
    background: var(--gold);
    color: var(--crimson);
    text-align: center;
    font-weight: bold;
    font-size: 15px;
    padding: 10px;
    letter-spacing: 2px;
  }

  /* ── SCREENS ── */
  .screen { display: none; height: calc(100vh - 44px); overflow-y: auto; padding: 20px 16px; }
  .screen.active { display: flex; flex-direction: column; align-items: center; justify-content: center; }

  /* ── JOIN SCREEN ── */
  .logo { font-size: 48px; margin-bottom: 8px; }
  .logo-title { font-size: 24px; color: var(--gold); font-weight: bold; letter-spacing: 3px; margin-bottom: 30px; text-align: center; }
  .input-label { font-size: 13px; color: var(--gold-l); margin-bottom: 8px; letter-spacing: 1px; }
  .name-input {
    width: 100%;
    max-width: 320px;
    padding: 14px 16px;
    font-size: 18px;
    font-family: 'Georgia', serif;
    background: var(--crimson);
    border: 2px solid var(--gold);
    border-radius: 8px;
    color: var(--off-white);
    text-align: center;
    outline: none;
    margin-bottom: 16px;
  }
  .name-input::placeholder { color: rgba(245,238,216,.4); }
  .name-input:focus { border-color: var(--gold-l); }
  .btn {
    width: 100%;
    max-width: 320px;
    padding: 16px;
    font-size: 18px;
    font-family: 'Georgia', serif;
    font-weight: bold;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    letter-spacing: 2px;
    transition: opacity .15s, transform .1s;
  }
  .btn:active { transform: scale(.97); }
  .btn-gold { background: var(--gold); color: var(--crimson); }
  .btn:disabled { opacity: .5; }

  /* ── WAITING SCREEN ── */
  .wait-emoji { font-size: 56px; margin-bottom: 12px; }
  .wait-name { font-size: 22px; color: var(--gold); font-weight: bold; margin-bottom: 8px; text-align: center; }
  .wait-msg { font-size: 15px; color: var(--off-white); text-align: center; line-height: 1.7; }
  .wait-dot { display: inline-block; animation: blink 1s infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }

  /* ── QUESTION SCREEN ── */
  .q-screen { align-items: stretch; justify-content: flex-start; padding: 12px; }
  .q-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 10px;
  }
  .q-num { font-size: 13px; color: var(--gold-l); letter-spacing: 1px; }
  .timer-badge {
    background: var(--crimson2);
    border: 1.5px solid var(--gold);
    border-radius: 20px;
    padding: 4px 14px;
    font-size: 16px;
    font-weight: bold;
    color: var(--gold);
    min-width: 52px;
    text-align: center;
    transition: color .3s, border-color .3s;
  }
  .timer-badge.danger { color: #e74c3c; border-color: #e74c3c; }
  .q-text-box {
    background: var(--crimson);
    border: 1.5px solid var(--gold);
    border-radius: 8px;
    padding: 16px;
    font-size: 17px;
    line-height: 1.6;
    margin-bottom: 14px;
    text-align: center;
    min-height: 80px;
    display: flex; align-items: center; justify-content: center;
  }
  .choices-list { display: flex; flex-direction: column; gap: 10px; }
  .choice-btn {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 16px;
    background: var(--crimson);
    border: 2px solid var(--gold);
    border-radius: 10px;
    color: var(--off-white);
    font-size: 15px;
    font-family: 'Georgia', serif;
    cursor: pointer;
    text-align: left;
    transition: background .15s, transform .1s, border-color .15s;
    width: 100%;
  }
  .choice-btn:active { transform: scale(.98); }
  .choice-btn:disabled { opacity: .6; cursor: default; transform: none; }
  .choice-btn.selected { background: var(--crimson2); border-color: var(--gold-l); }
  .choice-btn.correct  { background: var(--green); border-color: #28a745; }
  .choice-btn.wrong    { background: var(--red); border-color: #e74c3c; opacity: .7; }
  .choice-lbl {
    background: var(--gold);
    color: var(--crimson);
    font-weight: bold;
    border-radius: 6px;
    width: 32px; height: 32px;
    display: flex; align-items: center; justify-content: center;
    font-size: 15px;
    flex-shrink: 0;
  }
  .choice-btn.selected .choice-lbl { background: var(--gold-l); }
  .choice-btn.correct .choice-lbl  { background: #28a745; color: white; }
  .choice-btn.wrong .choice-lbl    { background: #e74c3c; color: white; }

  /* ── ANSWERED SCREEN ── */
  .answered-icon { font-size: 64px; margin-bottom: 12px; }
  .answered-msg { font-size: 18px; color: var(--off-white); text-align: center; line-height: 1.7; }
  .answered-time { font-size: 14px; color: var(--gold-l); margin-top: 8px; }

  /* ── RESULT SCREEN ── */
  .result-icon { font-size: 64px; margin-bottom: 8px; }
  .result-correct { font-size: 28px; font-weight: bold; color: #28a745; margin-bottom: 4px; }
  .result-wrong { font-size: 28px; font-weight: bold; color: #e74c3c; margin-bottom: 4px; }
  .result-pts { font-size: 44px; font-weight: bold; color: var(--gold); margin: 8px 0 4px; }
  .result-total { font-size: 14px; color: var(--gold-l); }
  .result-rank { font-size: 18px; color: var(--off-white); margin-top: 12px; }

  /* ── RANKING SCREEN ── */
  .ranking-list { width: 100%; max-width: 380px; list-style: none; }
  .ranking-item {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 14px; border-radius: 8px;
    margin-bottom: 8px;
    background: var(--crimson);
    border: 1px solid rgba(201,168,76,.35);
  }
  .ranking-item.me { border-color: var(--gold); background: rgba(201,168,76,.15); }
  .ranking-item.top1 { border-color: var(--gold); }
  .rank-badge {
    width: 34px; height: 34px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-weight: bold; font-size: 14px; flex-shrink: 0;
  }
  .rank-badge.g { background: var(--gold); color: var(--crimson); }
  .rank-badge.s { background: #aaa; color: #222; }
  .rank-badge.b { background: #cd7f32; color: white; }
  .rank-badge.n { background: var(--crimson2); color: var(--off-white); }
  .rank-name { flex: 1; font-size: 15px; }
  .rank-score { font-size: 16px; font-weight: bold; color: var(--gold); }

  /* ── FINISHED SCREEN ── */
  .finished-title { font-size: 28px; color: var(--gold); font-weight: bold; margin-bottom: 8px; letter-spacing: 3px; }
  .my-final-rank { font-size: 56px; font-weight: bold; color: var(--gold); }
  .my-final-score { font-size: 20px; color: var(--off-white); }
  .thanks { font-size: 15px; color: var(--gold-l); margin-top: 16px; text-align: center; line-height: 1.8; }
</style>
</head>
<body>

<div class="topbar">🎉 結婚式クイズ大会</div>

<!-- JOIN -->
<div class="screen active" id="screen-join">
  <div class="logo">💍</div>
  <div class="logo-title">クイズ大会</div>
  <div class="input-label">ニックネームを入力してください</div>
  <input class="name-input" type="text" id="name-input" maxlength="12" placeholder="例：たろう" autocomplete="off">
  <button class="btn btn-gold" id="join-btn" onclick="joinGame()">参加する！</button>
</div>

<!-- WAITING -->
<div class="screen" id="screen-waiting">
  <div class="wait-emoji">⏳</div>
  <div class="wait-name" id="wait-name"></div>
  <div class="wait-msg">
    参加登録完了！<br>
    幹事がクイズを開始するまで<br>
    お待ちください<span class="wait-dot">…</span>
  </div>
</div>

<!-- QUESTION -->
<div class="screen q-screen" id="screen-question">
  <div class="q-header">
    <span class="q-num" id="q-num">第1問 / 全10問</span>
    <span class="timer-badge" id="timer-badge">20</span>
  </div>
  <div class="q-text-box" id="q-text"></div>
  <div class="choices-list" id="choices-list"></div>
</div>

<!-- ANSWERED -->
<div class="screen" id="screen-answered">
  <div class="answered-icon">✅</div>
  <div class="answered-msg">
    回答を送信しました！<br>
    正解発表をお待ちください
  </div>
  <div class="answered-time" id="answered-time"></div>
</div>

<!-- RESULT -->
<div class="screen" id="screen-result">
  <div class="result-icon" id="result-icon"></div>
  <div id="result-judge"></div>
  <div class="result-pts" id="result-pts"></div>
  <div class="result-total" id="result-total"></div>
  <div class="result-rank" id="result-rank"></div>
</div>

<!-- RANKING -->
<div class="screen" id="screen-ranking" style="justify-content:flex-start;padding-top:16px;">
  <div style="font-size:18px;color:var(--gold);font-weight:bold;margin-bottom:12px;letter-spacing:2px;">🏆 現在のランキング</div>
  <ul class="ranking-list" id="ranking-list"></ul>
</div>

<!-- FINISHED -->
<div class="screen" id="screen-finished">
  <div class="finished-title">最終結果</div>
  <div class="my-final-rank" id="final-rank">-位</div>
  <div class="my-final-score" id="final-score"></div>
  <ul class="ranking-list" id="final-list" style="margin-top:16px;width:100%;max-width:380px;"></ul>
  <div class="thanks">ご参加ありがとうございました！<br>🎊 おふたりの門出をお祝い申し上げます 🎊</div>
</div>

<script>
const WS_URL = (location.protocol === 'https:' ? 'wss://' : 'ws://') + location.host;
const LABELS = ['A','B','C','D'];

let ws, myId, myName, myScore = 0;
let questionStartTime, timeLimit = 20, timerInterval;
let myAnswer = -1, currentQ = 0;

// ── WS ─────────────────────────────────────────────────────
function connect() {
  ws = new WebSocket(WS_URL);
  ws.onopen = () => {};
  ws.onclose = () => setTimeout(connect, 2000);
  ws.onmessage = (e) => {
    const msg = JSON.parse(e.data);
    switch (msg.type) {
      case 'joined':
        myId = msg.playerId;
        myName = msg.name;
        document.getElementById('wait-name').textContent = msg.name + ' さん';
        if (msg.phase === 'question') {
          showQuestion(msg.question, msg.elapsed);
        } else {
          showScreen('screen-waiting');
        }
        break;

      case 'question_start':
        myAnswer = -1;
        showQuestion(msg.question, 0);
        break;

      case 'answer_received':
        showAnswered();
        break;

      case 'answer_reveal':
        showResult(msg);
        break;

      case 'ranking':
        showRankingScreen(msg.ranking);
        break;

      case 'game_finished':
        showFinished(msg.ranking);
        break;
    }
  };
}

function joinGame() {
  const name = document.getElementById('name-input').value.trim();
  if (!name) { document.getElementById('name-input').focus(); return; }
  myName = name;
  document.getElementById('join-btn').disabled = true;
  ws.send(JSON.stringify({ type: 'player_join', name }));
}

document.getElementById('name-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') joinGame();
});

// ── SCREENS ────────────────────────────────────────────────
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  const el = document.getElementById(id);
  if (el) { el.classList.add('active'); el.scrollTop = 0; }
}

function showQuestion(q, elapsedMs = 0) {
  currentQ = q.index;
  timeLimit = q.timeLimit;
  questionStartTime = Date.now() - elapsedMs;
  myAnswer = -1;

  document.getElementById('q-num').textContent = `第${q.index+1}問 / 全${q.total}問`;
  document.getElementById('q-text').textContent = q.question;

  const list = document.getElementById('choices-list');
  list.innerHTML = '';
  q.choices.forEach((c, i) => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.id = 'choice-btn-' + i;
    btn.innerHTML = `<span class="choice-lbl">${LABELS[i]}</span><span>${c}</span>`;
    btn.onclick = () => sendAnswer(i);
    list.appendChild(btn);
  });

  showScreen('screen-question');
  startTimer();
}

function startTimer() {
  clearInterval(timerInterval);
  const badge = document.getElementById('timer-badge');
  timerInterval = setInterval(() => {
    const elapsed = (Date.now() - questionStartTime) / 1000;
    const remaining = Math.max(0, timeLimit - elapsed);
    badge.textContent = Math.ceil(remaining);
    badge.className = 'timer-badge' + (remaining < 7 ? ' danger' : '');
    if (remaining <= 0) { clearInterval(timerInterval); disableChoices(); }
  }, 100);
}

function sendAnswer(idx) {
  if (myAnswer >= 0) return;
  myAnswer = idx;
  document.querySelectorAll('.choice-btn').forEach((b, i) => {
    if (i === idx) b.classList.add('selected');
    b.disabled = true;
  });
  ws.send(JSON.stringify({ type: 'answer', choice: idx }));
}

function disableChoices() {
  document.querySelectorAll('.choice-btn').forEach(b => b.disabled = true);
}

function showAnswered() {
  clearInterval(timerInterval);
  const ms = Date.now() - questionStartTime;
  document.getElementById('answered-time').textContent = `回答時間：${(ms/1000).toFixed(2)}秒`;
  showScreen('screen-answered');
}

function showResult(msg) {
  clearInterval(timerInterval);
  const correct = msg.correct;
  const myAns = msg.answers[myId];
  const isCorrect = myAns && myAns.choice === correct;
  const pts = myAns ? (myAns.points || 0) : 0;
  myScore += pts;

  // ランキングで自分の順位を取得
  const ranking = msg.ranking;
  const myRankObj = ranking.find(r => r.id === myId);
  const myRank = myRankObj ? myRankObj.rank : '-';

  document.getElementById('result-icon').textContent = isCorrect ? '🎉' : '😢';
  const judge = document.getElementById('result-judge');
  if (isCorrect) {
    judge.className = 'result-correct'; judge.textContent = '正解！';
  } else {
    judge.className = 'result-wrong';
    judge.textContent = myAns ? '不正解…' : '時間切れ…';
  }
  document.getElementById('result-pts').textContent = isCorrect ? `+${pts}pts` : '+0pts';
  document.getElementById('result-total').textContent = `累計：${myScore}pts`;
  document.getElementById('result-rank').textContent = `現在 ${myRank}位`;

  showScreen('screen-result');
}

function showRankingScreen(ranking) {
  const ul = document.getElementById('ranking-list');
  ul.innerHTML = '';
  ranking.forEach(p => {
    const isMe = p.id === myId;
    const li = document.createElement('li');
    const medals = ['🥇','🥈','🥉'];
    const badgeCls = p.rank <= 3 ? ['g','s','b'][p.rank-1] : 'n';
    const badge = p.rank <= 3 ? medals[p.rank-1] : p.rank;
    li.className = 'ranking-item' + (isMe ? ' me' : '') + (p.rank===1?' top1':'');
    li.innerHTML = `<div class="rank-badge ${badgeCls}">${badge}</div>
      <div class="rank-name">${esc(p.name)}${isMe?' 👈':''}</div>
      <div class="rank-score">${p.score}pts</div>`;
    ul.appendChild(li);
  });
  showScreen('screen-ranking');
}

function showFinished(ranking) {
  const myRankObj = ranking.find(r => r.id === myId);
  const myRank = myRankObj ? myRankObj.rank : '-';
  myScore = myRankObj ? myRankObj.score : myScore;

  const medals = ['🥇','🥈','🥉'];
  document.getElementById('final-rank').textContent = myRank <= 3 ? (medals[myRank-1] + ' ' + myRank + '位') : myRank + '位';
  document.getElementById('final-score').textContent = `合計 ${myScore}pts`;

  const ul = document.getElementById('final-list');
  ul.innerHTML = '';
  ranking.forEach(p => {
    const isMe = p.id === myId;
    const li = document.createElement('li');
    const medals2 = ['🥇','🥈','🥉'];
    const badgeCls = p.rank <= 3 ? ['g','s','b'][p.rank-1] : 'n';
    const badge = p.rank <= 3 ? medals2[p.rank-1] : p.rank;
    li.className = 'ranking-item' + (isMe ? ' me' : '');
    li.innerHTML = `<div class="rank-badge ${badgeCls}">${badge}</div>
      <div class="rank-name">${esc(p.name)}${isMe?' 👈':''}</div>
      <div class="rank-score">${p.score}pts</div>`;
    ul.appendChild(li);
  });
  showScreen('screen-finished');
}

function esc(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

connect();
</script>
</body>
</html>
